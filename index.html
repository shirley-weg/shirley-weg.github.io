<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Trading Strategy Lab</title>
  <meta
    name="description"
    content="Trading Strategy Lab provides a Python-powered backtest tool, broker branch chip dashboard, and trading strategy research interface."
  />

  <style>
    :root {
      --ink: #17202a;
      --muted: #607080;
      --line: #dfe5ec;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --teal: #0f766e;
      --teal-dark: #0b4f4a;
      --gold: #b98500;
      --gold-soft: #fff7e6;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.65;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      background: rgba(246, 248, 251, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    nav {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.95rem;
    }

    .nav-links a:hover {
      color: var(--teal);
    }

    .hero {
      min-height: calc(100vh - 68px);
      display: flex;
      align-items: center;
      padding: 72px 0 42px;
    }

    .hero-content {
      max-width: 880px;
    }

    .eyebrow {
      color: var(--teal);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      max-width: 860px;
      font-size: clamp(3rem, 8vw, 6.8rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 8px;
      font-weight: 800;
      border: 1px solid transparent;
      transition: 0.18s ease;
      cursor: pointer;
    }

    .btn.primary {
      background: var(--teal);
      color: #ffffff;
    }

    .btn.primary:hover {
      background: var(--teal-dark);
      transform: translateY(-1px);
    }

    .btn.secondary {
      background: var(--panel);
      border-color: var(--line);
      color: var(--ink);
    }

    .btn.secondary:hover {
      border-color: var(--teal);
      color: var(--teal);
      transform: translateY(-1px);
    }

    .features {
      padding: 0 0 76px;
    }

    .section-head {
      margin-bottom: 22px;
    }

    .section-kicker {
      color: var(--teal);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .section-title {
      margin: 0;
      font-size: clamp(1.85rem, 4vw, 3rem);
      line-height: 1.16;
      letter-spacing: -0.035em;
    }

    .section-desc {
      max-width: 780px;
      color: var(--muted);
      margin: 12px 0 0;
      font-size: 1.05rem;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .feature-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 26px;
      box-shadow: var(--shadow);
      transition: 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .feature-card:hover {
      transform: translateY(-3px);
      border-color: rgba(15, 118, 110, 0.35);
    }

    .feature-card.highlight {
      border-color: rgba(185, 133, 0, 0.35);
      background:
        linear-gradient(135deg, rgba(255, 247, 230, 0.92), rgba(255, 255, 255, 0.96)),
        var(--panel);
    }

    .feature-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.1);
      color: var(--teal);
      font-size: 0.78rem;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .feature-card.highlight .feature-badge {
      background: rgba(185, 133, 0, 0.14);
      color: var(--gold);
    }

    .feature-card h2 {
      margin: 0 0 22px;
      font-size: 1.55rem;
      line-height: 1.28;
      letter-spacing: -0.02em;
    }

    footer {
      border-top: 1px solid var(--line);
      color: var(--muted);
      padding: 24px 0;
      font-size: 0.92rem;
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(100% - 28px, 1120px);
      }

      nav {
        height: auto;
        min-height: 68px;
        padding: 14px 0;
        align-items: flex-start;
        flex-direction: column;
      }

      .nav-links {
        gap: 12px;
        flex-wrap: wrap;
        font-size: 0.9rem;
      }

      .hero {
        min-height: auto;
        padding: 56px 0 58px;
      }

      h1 {
        font-size: clamp(2.6rem, 15vw, 4.4rem);
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .btn {
        width: 100%;
      }

      .feature-grid {
        grid-template-columns: 1fr;
      }

      .feature-card {
        padding: 22px;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav class="wrap">
      <a class="brand" href="./index.html">Trading Strategy Lab</a>

      <div class="nav-links">
        <a href="#features">功能入口</a>
        <a href="./trading-strategy-lab/broker.html">券商分點籌碼</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <div class="hero-content">
          <div class="eyebrow">Python Strategy Library on GitHub</div>

          <h1>交易策略庫 與 小工具</h1>

          <div class="actions">
            <a
              class="btn primary"
              href="https://github.com/shirley-weg/shirley-weg.github.io/tree/main/trading-strategy-lab"
              target="_blank"
              rel="noreferrer"
            >
              查看 GitHub 原始碼
            </a>

            <a
              class="btn secondary"
              href="https://shirley-trading-strategy-lab.streamlit.app/"
              target="_blank"
              rel="noreferrer"
            >
              開啟回測工具
            </a>
          </div>
        </div>
      </div>
    </section>

    <section class="features" id="features">
      <div class="wrap">
        <div class="section-head">
          <div class="section-kicker">Research Tools</div>
          <h2 class="section-title">功能入口</h2>
          <p class="section-desc">
            目前網站整合策略回測與籌碼資料查詢，後續可持續新增更多量化研究工具。
          </p>
        </div>

        <div class="feature-grid">
          <article class="feature-card">
            <div class="feature-badge">Backtest</div>

            <h2>回測工具</h2>

            <a
              class="btn secondary"
              href="https://shirley-trading-strategy-lab.streamlit.app/"
              target="_blank"
              rel="noreferrer"
            >
              開啟回測工具
            </a>
          </article>

          <article class="feature-card highlight">
            <div class="feature-badge">Broker Branch Dashboard</div>

            <h2>券商分點籌碼查詢</h2>

            <a class="btn primary" href="./trading-strategy-lab/broker.html">
              進入券商分點查詢
            </a>
          </article>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      Trading Strategy Lab. Research use only. Not investment advice.
    </div>
  </footer>
</body>
</html>
