<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Trading Strategy Lab | Pair Trading Backtest</title>
  <meta
    name="description"
    content="Trading Strategy Lab provides a Python-powered pair trading backtest tool and trading strategy research interface."
  />

  <style>
    :root {
      --ink: #17202a;
      --muted: #607080;
      --line: #dfe5ec;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --teal: #0f766e;
      --teal-dark: #0b4f4a;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.65;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      background: rgba(246, 248, 251, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    nav {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .hero {
      min-height: calc(100vh - 68px);
      display: flex;
      align-items: center;
      padding: 72px 0;
    }

    .hero-content {
      max-width: 880px;
    }

    .eyebrow {
      color: var(--teal);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      max-width: 860px;
      font-size: clamp(3rem, 8vw, 6.8rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero p {
      max-width: 820px;
      margin: 28px 0 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      line-height: 1.85;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 8px;
      font-weight: 800;
      border: 1px solid transparent;
      transition: 0.18s ease;
    }

    .btn.primary {
      background: var(--teal);
      color: #ffffff;
    }

    .btn.primary:hover {
      background: var(--teal-dark);
      transform: translateY(-1px);
    }

    .btn.secondary {
      background: var(--panel);
      border-color: var(--line);
      color: var(--ink);
    }

    .btn.secondary:hover {
      border-color: var(--teal);
      color: var(--teal);
      transform: translateY(-1px);
    }

    footer {
      border-top: 1px solid var(--line);
      color: var(--muted);
      padding: 24px 0;
      font-size: 0.92rem;
    }

    @media (max-width: 720px) {
      .wrap {
        width: min(100% - 28px, 1120px);
      }

      .hero {
        min-height: auto;
        padding: 56px 0 72px;
      }

      h1 {
        font-size: clamp(2.6rem, 15vw, 4.4rem);
      }

      .hero p {
        font-size: 1.05rem;
      }

      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <header>
    <nav class="wrap">
      <a class="brand" href="#">Trading Strategy Lab</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="wrap">
        <div class="hero-content">
          <div class="eyebrow">Python Strategy Library on GitHub</div>

          <h1>交易策略庫與 Pair Trading 回測入口</h1>

          <p>
            這裡整理交易策略研究與回測工具，目前提供 Pair Trading 策略回測，
            可選擇標的、回測時間、權重最佳化方法與交易成本，
            並查看策略績效、權益曲線、風險指標與交易明細。
          </p>

          <div class="actions">
            <a
              class="btn primary"
              href="https://github.com/shirley-weg/shirley-weg.github.io/tree/main/trading-strategy-lab"
              target="_blank"
              rel="noreferrer"
            >
              查看 GitHub 原始碼
            </a>

            <a
              class="btn secondary"
              href="https://shirley-trading-strategy-lab.streamlit.app/"
              target="_blank"
              rel="noreferrer"
            >
              開啟回測工具
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="wrap">
      Trading Strategy Lab. Research use only. Not investment advice.
    </div>
  </footer>
</body>
</html>
